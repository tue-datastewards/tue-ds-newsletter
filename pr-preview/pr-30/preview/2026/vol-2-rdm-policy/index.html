              &lt;tbody&gt;
                &lt;tr&gt;
                  &lt;td&gt;
                    &lt;h2&gt;RDM Policy&lt;/h2&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;Did you know that TU/e has a brand new Research Data Management Policy?&lt;/p&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;The TU/e Research Data Framework Policy (RDM Framework Policy) defines roles and responsibilities for researchers and research support staff regarding the management of research data.&lt;/p&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;You can learn more about the policy and what it means to you on our&lt;!-- --&gt; &lt;a href=&quot;https://rdm.tue.nl/docs/intro/tue-policy/&quot; style=&quot;color:rgb(116,36,89);text-decoration:none&quot; target=&quot;_blank&quot;&gt;RDM Handbook page:&lt;/a&gt;&lt;/p&gt;
                    &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot; style=&quot;text-align:center&quot;&gt;
                      &lt;tbody&gt;
                        &lt;tr&gt;
                          &lt;td&gt;&lt;a href=&quot;https://rdm.tue.nl/docs/intro/tue-policy/&quot; style=&quot;background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px&quot; target=&quot;_blank&quot;&gt;&lt;span&gt;&lt;!--[if mso]&gt;&lt;i style=&quot;mso-font-width:400%;mso-text-raise:18&quot; hidden&gt;&amp;#8202;&amp;#8202;&lt;/i&gt;&lt;![endif]--&gt;&lt;/span&gt;&lt;span style=&quot;max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px&quot;&gt;Learn more about the RDM Policy&lt;/span&gt;&lt;span&gt;&lt;!--[if mso]&gt;&lt;i style=&quot;mso-font-width:400%&quot; hidden&gt;&amp;#8202;&amp;#8202;&amp;#8203;&lt;/i&gt;&lt;![endif]--&gt;&lt;/span&gt;&lt;/a&gt;&lt;/td&gt;
                        &lt;/tr&gt;
                      &lt;/tbody&gt;
                    &lt;/table&gt;
                  &lt;/td&gt;
                &lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
            &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot;&gt;
              &lt;tbody&gt;
                &lt;tr&gt;
                  &lt;td&gt;
                    &lt;h2&gt;What&amp;#x27;s new in the Research Cockpit?&lt;/h2&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;As part of being compliant with the RDM Policy, we have developed the Research Cockpit, a one stop shop for researchers, where you can find templates for your Data Management Plan, Ethical Application, Data sharing agreements, and much more.&lt;/p&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;In this newsletter, we would like to highlight:&lt;/p&gt;
                    &lt;h3 style=&quot;font-size:1.125rem;line-height:1.75rem&quot;&gt;RAPS: Research Archival Packaging Solution&lt;/h3&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;Closed TU/e archive for data underlying your article once it is accepted for publication in a scientific peer-reviewed journal. RAPS will preserve this research data for long term.&lt;/p&gt;
                    &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot; style=&quot;text-align:center&quot;&gt;
                      &lt;tbody&gt;
                        &lt;tr&gt;
                          &lt;td&gt;&lt;a href=&quot;https://cockpit.research.tue.nl/servicedesk/customer/portal/7&quot; style=&quot;color:#067df7;text-decoration:none&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;RAPS&quot; src=&quot;/tue-ds-newsletter/pr-preview/pr-30/static/RAPS.png&quot; style=&quot;margin-left:auto;margin-right:auto;margin-top:1rem;margin-bottom:1rem;border-radius:0.5rem;display:block;outline:none;border:none;text-decoration:none&quot; width=&quot;100%&quot; /&gt;&lt;/a&gt;&lt;a href=&quot;https://cockpit.research.tue.nl/servicedesk/customer/portal/7&quot; style=&quot;background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px&quot; target=&quot;_blank&quot;&gt;&lt;span&gt;&lt;!--[if mso]&gt;&lt;i style=&quot;mso-font-width:400%;mso-text-raise:18&quot; hidden&gt;&amp;#8202;&amp;#8202;&lt;/i&gt;&lt;![endif]--&gt;&lt;/span&gt;&lt;span style=&quot;max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px&quot;&gt;Go to RAPS&lt;/span&gt;&lt;span&gt;&lt;!--[if mso]&gt;&lt;i style=&quot;mso-font-width:400%&quot; hidden&gt;&amp;#8202;&amp;#8202;&amp;#8203;&lt;/i&gt;&lt;![endif]--&gt;&lt;/span&gt;&lt;/a&gt;&lt;/td&gt;
                        &lt;/tr&gt;
                      &lt;/tbody&gt;
                    &lt;/table&gt;
                  &lt;/td&gt;
                &lt;/tr&gt;

            &lt;/table&gt;
            &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot;&gt;
              &lt;tbody&gt;
                &lt;tr&gt;
                  &lt;td&gt;
                    &lt;h2&gt;DataBites&lt;/h2&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;DataBites is a series of online sessions designed to spread awareness on various topics related to Research Data Management. Each session features a quick 15-minute talk or demo, followed by a 15-minute chat, focusing on one specific RDM topic. From RDM essentials, FAIR principles, documentation, versioning, storage to preparing data for publishing (to name just a few).&lt;/p&gt;
                    &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot; style=&quot;text-align:center&quot;&gt;
                      &lt;tbody&gt;
                        &lt;tr&gt;
                          &lt;td&gt;&lt;a href=&quot;https://rdm.tue.nl/docs/learning-resources/data-bites/&quot; style=&quot;color:#067df7;text-decoration:none&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;DataBites&quot; src=&quot;/tue-ds-newsletter/pr-preview/pr-30/static/data-bites-banner.jpg&quot; style=&quot;margin-left:auto;margin-right:auto;margin-top:1rem;margin-bottom:1rem;border-radius:0.5rem;display:block;outline:none;border:none;text-decoration:none&quot; width=&quot;100%&quot; /&gt;&lt;/a&gt;&lt;a href=&quot;https://rdm.tue.nl/docs/learning-resources/data-bites/&quot; style=&quot;background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px&quot; target=&quot;_blank&quot;&gt;&lt;span&gt;&lt;!--[if mso]&gt;&lt;i style=&quot;mso-font-width:400%;mso-text-raise:18&quot; hidden&gt;&amp;#8202;&amp;#8202;&lt;/i&gt;&lt;![endif]--&gt;&lt;/span&gt;&lt;span style=&quot;max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px&quot;&gt;Join DataBites&lt;/span&gt;&lt;span&gt;&lt;!--[if mso]&gt;&lt;i style=&quot;mso-font-width:400%&quot; hidden&gt;&amp;#8202;&amp;#8202;&amp;#8203;&lt;/i&gt;&lt;![endif]--&gt;&lt;/span&gt;&lt;/a&gt;&lt;/td&gt;
                        &lt;/tr&gt;
                      &lt;/tbody&gt;
                    &lt;/table&gt;
                  &lt;/td&gt;
                &lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
            &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot;&gt;
              &lt;tbody&gt;
                &lt;tr&gt;
                  &lt;td&gt;
                    &lt;h2&gt;FAIR Data Clinic&lt;/h2&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;Do you care about your data having an impact beyond your papers?&lt;/p&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;Join our monthly FAIR Data Clinic: a practical session in which we help you making your dataset ready for repository deposit.&lt;/p&gt;
                    &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot; style=&quot;text-align:center&quot;&gt;
                      &lt;tbody&gt;
                        &lt;tr&gt;

                        &lt;/tr&gt;
                      &lt;/tbody&gt;
                    &lt;/table&gt;
                  &lt;/td&gt;
                &lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
            &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot;&gt;
              &lt;tbody&gt;
                &lt;tr&gt;
                  &lt;td&gt;
                    &lt;h2&gt;Open Science Community Eindhoven&lt;/h2&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;The community is a growing group of researchers, engineers, scientists and university faculty who care about transparency and quality in science.&lt;/p&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;Our goal is to form an inclusive community of people working on improving the way we conduct open science at the Eindhoven University of Technology and to help others do the same.&lt;/p&gt;
                    &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot; style=&quot;text-align:center&quot;&gt;
                      &lt;tbody&gt;
                        &lt;tr&gt;
                          &lt;td&gt;&lt;a href=&quot;https://osceindhoven.nl/&quot; style=&quot;color:#067df7;text-decoration:none&quot; target=&quot;_blank&quot;&gt;&lt;img alt=&quot;Open Science Community Eindhoven logo&quot; src=&quot;/tue-ds-newsletter/pr-preview/pr-30/static/osc-eindhoven-logo.svg&quot; style=&quot;margin-left:auto;margin-right:auto;margin-top:1rem;margin-bottom:1rem;display:block;outline:none;border:none;text-decoration:none&quot; width=&quot;200&quot; /&gt;&lt;/a&gt;&lt;a href=&quot;https://osceindhoven.nl/&quot; style=&quot;background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px&quot; target=&quot;_blank&quot;&gt;&lt;span&gt;&lt;!--[if mso]&gt;&lt;i style=&quot;mso-font-width:400%;mso-text-raise:18&quot; hidden&gt;&amp;#8202;&amp;#8202;&lt;/i&gt;&lt;![endif]--&gt;&lt;/span&gt;&lt;span style=&quot;max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px&quot;&gt;Learn more about OSC Eindhoven&lt;/span&gt;&lt;span&gt;&lt;!--[if mso]&gt;&lt;i style=&quot;mso-font-width:400%&quot; hidden&gt;&amp;#8202;&amp;#8202;&amp;#8203;&lt;/i&gt;&lt;![endif]--&gt;&lt;/span&gt;&lt;/a&gt;&lt;/td&gt;
                        &lt;/tr&gt;
                      &lt;/tbody&gt;
                    &lt;/table&gt;
                  &lt;/td&gt;
                &lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
            &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot;&gt;
              &lt;tbody&gt;
                &lt;tr&gt;
                  &lt;td&gt;
                    &lt;h2&gt;&lt;span style=&quot;font-size:0.875rem;line-height:1.25rem;font-weight:400&quot;&gt;Trivia from Data Steward:&lt;br/&gt;&lt;/span&gt;The Mere-Exposure Effect&lt;/h2&gt;
                    &lt;p style=&quot;background-color:rgb(116,36,89);color:rgb(255,255,255);padding-left:0.75rem;padding-right:0.75rem;padding-top:0.75rem;padding-bottom:0.75rem;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;Did you know that simply seeing something repeatedly makes you like it more, even if you don&amp;#x27;t realize it? Psychologists call this phenomenon the “mere-exposure effect”. This is one reason why advertisers repeat their messages.&lt;/p&gt;
                    &lt;table align=&quot;center&quot; width=&quot;100%&quot; border=&quot;0&quot; cellPadding=&quot;0&quot; cellSpacing=&quot;0&quot; role=&quot;presentation&quot; style=&quot;text-align:center&quot;&gt;
                      &lt;tbody&gt;
                        &lt;tr&gt;
                          &lt;td&gt;&lt;img height=&quot;250&quot; src=&quot;https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Campbell%27s_Soup_Cans_by_Andy_Warhol.jpg/960px-Campbell%27s_Soup_Cans_by_Andy_Warhol.jpg&quot; style=&quot;width:100%;object-fit:cover;border-radius:0.5rem;margin-top:1rem;margin-bottom:1rem;display:block;outline:none;border:none;text-decoration:none&quot; /&gt;
                            &lt;p style=&quot;font-size:0.75rem;line-height:1rem;color:rgb(107,114,128);margin:16px 0&quot;&gt;Andy Warhol&amp;#x27;s Campbell&amp;#x27;s Soup Cans paintings displayed at the Museum of Modern Art, photographed by Brandon Fick, 12 May 2006. Source: Flickr. Licensed under CC BY 2.0.&lt;/p&gt;
                          &lt;/td&gt;
                        &lt;/tr&gt;
                      &lt;/tbody&gt;
                    &lt;/table&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;The effect highlights the power of the environment on us. Feeling a bit helpless? We can curate what we surround ourselves with to influence our preferences. Do you have something that you don&amp;#x27;t enjoy but want to do for the greater good? Perhaps you find making data FAIR challenging, but you want to do so for open science? You can surround yourself with things that you&amp;#x27;d like to overcome and let familiarity do its work. Keep the&lt;!-- --&gt; &lt;a href=&quot;https://rdm.tue.nl/&quot; style=&quot;color:rgb(116,36,89);font-weight:700;text-decoration:none&quot; target=&quot;_blank&quot;&gt;RDM Handbook&lt;/a&gt; &lt;!-- --&gt;on your desk, join the&lt;!-- --&gt; &lt;a href=&quot;https://rdm.tue.nl/docs/learning-resources/data-bites/&quot; style=&quot;color:rgb(116,36,89);font-weight:700;text-decoration:none&quot; target=&quot;_blank&quot;&gt;DataBites session&lt;/a&gt;, or sign up for&lt;!-- --&gt; &lt;a href=&quot;https://rdm.tue.nl/docs/learning-resources/fair-clinic/&quot; style=&quot;color:rgb(116,36,89);font-weight:700;text-decoration:none&quot; target=&quot;_blank&quot;&gt;FAIR Data Clinics&lt;/a&gt;. Let&amp;#x27;s design our environment to conquer our own resistance.&lt;/p&gt;
                    &lt;p style=&quot;font-size:14px;line-height:24px;margin:16px 0&quot;&gt;Nami (social psychology)&lt;/p&gt;
                  &lt;/td&gt;
                &lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/td&gt;
        &lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;

3e\u003ca href=\"https://rdm.tue.nl/\" style=\"color:rgb(255,255,255);text-decoration:none\" target=\"_blank\"\u003e\n                              \u003cp style=\"font-size:1.125rem;line-height:1.75rem;font-weight:600;margin:16px 0\"\u003eResearch Data Stewards Newsletter\u003c/p\u003e\n                            \u003c/a\u003e\u003c/td\u003e\n                          \u003ctd data-id=\"__react-email-column\"\u003e\n                            \u003cp style=\"color:rgb(250,250,250);font-size:14px;line-height:24px;margin:16px 0\"\u003eVol. 2\u003c/p\u003e\n                          \u003c/td\u003e\n                        \u003c/tr\u003e\n                      \u003c/tbody\u003e\n                    \u003c/table\u003e\n                  \u003c/td\u003e\n                \u003c/tr\u003e\n              \u003c/tbody\u003e\n            \u003c/table\u003e\n          \u003c/td\u003e\n        \u003c/tr\u003e\n      \u003c/tbody\u003e\n    \u003c/table\u003e\n    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"background-color:rgb(255,255,255);color:rgb(18,18,18);padding-left:0.75rem;padding-right:0.75rem;max-width:37.5em\"\u003e\n      \u003ctbody\u003e\n        \u003ctr style=\"width:100%\"\u003e\n          \u003ctd\u003e\n            \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"text-align:center;padding-top:20px;padding-bottom:20px\"\u003e\n              \u003ctbody\u003e\n                \u003ctr\u003e\n                  \u003ctd\u003e\n                    \u003ch1 style=\"margin-top:0px;margin-bottom:25px\"\u003eRDM Policy, DataBites,\u003cbr /\u003eFAIR Clinic \u0026amp; more\u003c/h1\u003e\u003cimg src=\"https://zenodo.org/api/iiif/record:15309047:1-0040%20Research%20Data%20Management%20Framework%20Policy.pdf/pct:0,5,100,40/%5E1200,/0/default.jpg\" style=\"border-radius:0.5rem;display:block;outline:none;border:none;text-decoration:none\" width=\"100%\" /\u003e\n                  \u003c/td\u003e\n                \u003c/tr\u003e\n              \u003c/tbody\u003e\n            \u003c/table\u003e\n          \u003c/td\u003e\n        \u003c/tr\u003e\n      \u003c/tbody\u003e\n    \u003c/table\u003e\n    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"background-color:rgb(255,255,255);color:rgb(18,18,18);padding-left:0.75rem;padding-right:0.75rem;max-width:37.5em\"\u003e\n      \u003ctbody\u003e\n        \u003ctr style=\"width:100%\"\u003e\n          \u003ctd\u003e\n            \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\"\u003e\n              \u003ctbody\u003e\n                \u003ctr\u003e\n                  \u003ctd\u003e\n                    \u003ch2\u003eRDM Policy\u003c/h2\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eDid you know that TU/e has a brand new Research Data Management Policy?\u003c/p\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eThe TU/e Research Data Framework Policy (RDM Framework Policy) defines roles and responsibilities for researchers and research support staff regarding the management of research data.\u003c/p\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eYou can learn more about the policy and what it means to you on our\u003c!-- --\u003e \u003ca href=\"https://rdm.tue.nl/docs/intro/tue-policy/\" style=\"color:rgb(116,36,89);text-decoration:none\" target=\"_blank\"\u003eRDM Handbook page:\u003c/a\u003e\u003c/p\u003e\n                    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"text-align:center\"\u003e\n                      \u003ctbody\u003e\n                        \u003ctr\u003e\n                          \u003ctd\u003e\u003ca href=\"https://rdm.tue.nl/docs/intro/tue-policy/\" style=\"background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px\" target=\"_blank\"\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%;mso-text-raise:18\" hidden\u003e\u0026#8202;\u0026#8202;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003cspan style=\"max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px\"\u003eLearn more about the RDM Policy\u003c/span\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%\" hidden\u003e\u0026#8202;\u0026#8202;\u0026#8203;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003c/a\u003e\u003c/td\u003e\n                        \u003c/tr\u003e\n                      \u003c/tbody\u003e\n                    \u003c/table\u003e\n                  \u003c/td\u003e\n                \u003c/tr\u003e\n              \u003c/tbody\u003e\n            \u003c/table\u003e\n            \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\"\u003e\n              \u003ctbody\u003e\n                \u003ctr\u003e\n                  \u003ctd\u003e\n                    \u003ch2\u003eWhat\u0026#x27;s new in the Research Cockpit?\u003c/h2\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eAs part of being compliant with the RDM Policy, we have developed the Research Cockpit, a one stop shop for researchers, where you can find templates for your Data Management Plan, Ethical Application, Data sharing agreements, and much more.\u003c/p\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eIn this newsletter, we would like to highlight:\u003c/p\u003e\n                    \u003ch3 style=\"font-size:1.125rem;line-height:1.75rem\"\u003eRAPS: Research Archival Packaging Solution\u003c/h3\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eClosed TU/e archive for data underlying your article once it is accepted for publication in a scientific peer-reviewed journal. RAPS will preserve this research data for long term.\u003c/p\u003e\n                    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"text-align:center\"\u003e\n                      \u003ctbody\u003e\n                        \u003ctr\u003e\n                          \u003ctd\u003e\u003ca href=\"https://cockpit.research.tue.nl/servicedesk/customer/portal/7\" style=\"color:#067df7;text-decoration:none\" target=\"_blank\"\u003e\u003cimg alt=\"RAPS\" src=\"/tue-ds-newsletter/pr-preview/pr-30/static/RAPS.png\" style=\"margin-left:auto;margin-right:auto;margin-top:1rem;margin-bottom:1rem;border-radius:0.5rem;display:block;outline:none;border:none;text-decoration:none\" width=\"100%\" /\u003e\u003c/a\u003e\u003ca href=\"https://cockpit.research.tue.nl/servicedesk/customer/portal/7\" style=\"background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px\" target=\"_blank\"\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%;mso-text-raise:18\" hidden\u003e\u0026#8202;\u0026#8202;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003cspan style=\"max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px\"\u003eGo to RAPS\u003c/span\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%\" hidden\u003e\u0026#8202;\u0026#8202;\u0026#8203;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003c/a\u003e\u003c/td\u003e\n                        \u003c/tr\u003e\n                      \u003c/tbody\u003e\n                    \u003c/table\u003e\n                  \u003c/td\u003e\n                \u003c/tr\u003e\n              \u003c/tbody\u003e\n            \u003c/table\u003e\n            \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\"\u003e\n              \u003ctbody\u003e\n                \u003ctr\u003e\n                  \u003ctd\u003e\n                    \u003ch2\u003eDataBites\u003c/h2\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eDataBites is a series of online sessions designed to spread awareness on various topics related to Research Data Management. Each session features a quick 15-minute talk or demo, followed by a 15-minute chat, focusing on one specific RDM topic. From RDM essentials, FAIR principles, documentation, versioning, storage to preparing data for publishing (to name just a few).\u003c/p\u003e\n                    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"text-align:center\"\u003e\n                      \u003ctbody\u003e\n                        \u003ctr\u003e\n                          \u003ctd\u003e\u003ca href=\"https://rdm.tue.nl/docs/learning-resources/data-bites/\" style=\"color:#067df7;text-decoration:none\" target=\"_blank\"\u003e\u003cimg alt=\"DataBites\" src=\"/tue-ds-newsletter/pr-preview/pr-30/static/data-bites-banner.jpg\" style=\"margin-left:auto;margin-right:auto;margin-top:1rem;margin-bottom:1rem;border-radius:0.5rem;display:block;outline:none;border:none;text-decoration:none\" width=\"100%\" /\u003e\u003c/a\u003e\u003ca href=\"https://rdm.tue.nl/docs/learning-resources/data-bites/\" style=\"background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px\" target=\"_blank\"\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%;mso-text-raise:18\" hidden\u003e\u0026#8202;\u0026#8202;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003cspan style=\"max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px\"\u003eJoin DataBites\u003c/span\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%\" hidden\u003e\u0026#8202;\u0026#8202;\u0026#8203;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003c/a\u003e\u003c/td\u003e\n                        \u003c/tr\u003e\n                      \u003c/tbody\u003e\n                    \u003c/table\u003e\n                  \u003c/td\u003e\n                \u003c/tr\u003e\n              \u003c/tbody\u003e\n            \u003c/table\u003e\n            \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\"\u003e\n              \u003ctbody\u003e\n                \u003ctr\u003e\n                  \u003ctd\u003e\n                    \u003ch2\u003eFAIR Data Clinic\u003c/h2\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eDo you care about your data having an impact beyond your papers?\u003c/p\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eJoin our monthly FAIR Data Clinic: a practical session in which we help you making your dataset ready for repository deposit.\u003c/p\u003e\n                    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"text-align:center\"\u003e\n                      \u003ctbody\u003e\n                        \u003ctr\u003e\n                          \u003ctd\u003e\u003ca href=\"https://rdm.tue.nl/docs/learning-resources/fair-clinic/\" style=\"color:#067df7;text-decoration:none\" target=\"_blank\"\u003e\u003cimg alt=\"FAIR Clinic\" src=\"https://rdm.tue.nl/assets/images/fair-clinic-3a2f86ded67e9d3449adb6e2856eef3d.jpg\" style=\"margin-left:auto;margin-right:auto;margin-top:1rem;margin-bottom:1rem;border-radius:0.5rem;display:block;outline:none;border:none;text-decoration:none\" width=\"100%\" /\u003e\u003c/a\u003e\u003ca href=\"https://rdm.tue.nl/docs/learning-resources/fair-clinic/\" style=\"background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px\" target=\"_blank\"\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%;mso-text-raise:18\" hidden\u003e\u0026#8202;\u0026#8202;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003cspan style=\"max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px\"\u003eSign up for FAIR Data Clinic\u003c/span\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%\" hidden\u003e\u0026#8202;\u0026#8202;\u0026#8203;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003c/a\u003e\u003c/td\u003e\n                        \u003c/tr\u003e\n                      \u003c/tbody\u003e\n                    \u003c/table\u003e\n                  \u003c/td\u003e\n                \u003c/tr\u003e\n              \u003c/tbody\u003e\n            \u003c/table\u003e\n            \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\"\u003e\n              \u003ctbody\u003e\n                \u003ctr\u003e\n                  \u003ctd\u003e\n                    \u003ch2\u003eOpen Science Community Eindhoven\u003c/h2\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eThe community is a growing group of researchers, engineers, scientists and university faculty who care about transparency and quality in science.\u003c/p\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eOur goal is to form an inclusive community of people working on improving the way we conduct open science at the Eindhoven University of Technology and to help others do the same.\u003c/p\u003e\n                    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"text-align:center\"\u003e\n                      \u003ctbody\u003e\n                        \u003ctr\u003e\n                          \u003ctd\u003e\u003ca href=\"https://osceindhoven.nl/\" style=\"color:#067df7;text-decoration:none\" target=\"_blank\"\u003e\u003cimg alt=\"Open Science Community Eindhoven logo\" src=\"/tue-ds-newsletter/pr-preview/pr-30/static/osc-eindhoven-logo.svg\" style=\"margin-left:auto;margin-right:auto;margin-top:1rem;margin-bottom:1rem;display:block;outline:none;border:none;text-decoration:none\" width=\"200\" /\u003e\u003c/a\u003e\u003ca href=\"https://osceindhoven.nl/\" style=\"background-color:rgb(116,36,89);color:rgb(255,255,255);box-sizing:border-box;border-radius:0.375rem;padding-top:0.75rem;padding-bottom:0.75rem;padding-left:1rem;padding-right:1rem;text-align:center;font-weight:600;width:auto;margin-top:1rem;margin-bottom:1rem;line-height:100%;text-decoration:none;display:inline-block;max-width:100%;mso-padding-alt:0px;padding:12px 16px 12px 16px\" target=\"_blank\"\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%;mso-text-raise:18\" hidden\u003e\u0026#8202;\u0026#8202;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003cspan style=\"max-width:100%;display:inline-block;line-height:120%;mso-padding-alt:0px;mso-text-raise:9px\"\u003eLearn more about OSC Eindhoven\u003c/span\u003e\u003cspan\u003e\u003c!--[if mso]\u003e\u003ci style=\"mso-font-width:400%\" hidden\u003e\u0026#8202;\u0026#8202;\u0026#8203;\u003c/i\u003e\u003c![endif]--\u003e\u003c/span\u003e\u003c/a\u003e\u003c/td\u003e\n                        \u003c/tr\u003e\n                      \u003c/tbody\u003e\n                    \u003c/table\u003e\n                  \u003c/td\u003e\n                \u003c/tr\u003e\n              \u003c/tbody\u003e\n            \u003c/table\u003e\n            \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\"\u003e\n              \u003ctbody\u003e\n                \u003ctr\u003e\n                  \u003ctd\u003e\n                    \u003ch2\u003e\u003cspan style=\"font-size:0.875rem;line-height:1.25rem;font-weight:400\"\u003eTrivia from Data Steward:\u003cbr/\u003e\u003c/span\u003eThe Mere-Exposure Effect\u003c/h2\u003e\n                    \u003cp style=\"background-color:rgb(116,36,89);color:rgb(255,255,255);padding-left:0.75rem;padding-right:0.75rem;padding-top:0.75rem;padding-bottom:0.75rem;font-size:14px;line-height:24px;margin:16px 0\"\u003eDid you know that simply seeing something repeatedly makes you like it more, even if you don\u0026#x27;t realize it? Psychologists call this phenomenon the “mere-exposure effect”. This is one reason why advertisers repeat their messages.\u003c/p\u003e\n                    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"text-align:center\"\u003e\n                      \u003ctbody\u003e\n                        \u003ctr\u003e\n                          \u003ctd\u003e\u003cimg height=\"250\" src=\"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Campbell%27s_Soup_Cans_by_Andy_Warhol.jpg/960px-Campbell%27s_Soup_Cans_by_Andy_Warhol.jpg\" style=\"width:100%;object-fit:cover;border-radius:0.5rem;margin-top:1rem;margin-bottom:1rem;display:block;outline:none;border:none;text-decoration:none\" /\u003e\n                            \u003cp style=\"font-size:0.75rem;line-height:1rem;color:rgb(107,114,128);margin:16px 0\"\u003eAndy Warhol\u0026#x27;s Campbell\u0026#x27;s Soup Cans paintings displayed at the Museum of Modern Art, photographed by Brandon Fick, 12 May 2006. Source: Flickr. Licensed under CC BY 2.0.\u003c/p\u003e\n                          \u003c/td\u003e\n                        \u003c/tr\u003e\n                      \u003c/tbody\u003e\n                    \u003c/table\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eThe effect highlights the power of the environment on us. Feeling a bit helpless? We can curate what we surround ourselves with to influence our preferences. Do you have something that you don\u0026#x27;t enjoy but want to do for the greater good? Perhaps you find making data FAIR challenging, but you want to do so for open science? You can surround yourself with things that you\u0026#x27;d like to overcome and let familiarity do its work. Keep the\u003c!-- --\u003e \u003ca href=\"https://rdm.tue.nl/\" style=\"color:rgb(116,36,89);font-weight:700;text-decoration:none\" target=\"_blank\"\u003eRDM Handbook\u003c/a\u003e \u003c!-- --\u003eon your desk, join the\u003c!-- --\u003e \u003ca href=\"https://rdm.tue.nl/docs/learning-resources/data-bites/\" style=\"color:rgb(116,36,89);font-weight:700;text-decoration:none\" target=\"_blank\"\u003eDataBites session\u003c/a\u003e, or sign up for\u003c!-- --\u003e \u003ca href=\"https://rdm.tue.nl/docs/learning-resources/fair-clinic/\" style=\"color:rgb(116,36,89);font-weight:700;text-decoration:none\" target=\"_blank\"\u003eFAIR Data Clinics\u003c/a\u003e. Let\u0026#x27;s design our environment to conquer our own resistance.\u003c/p\u003e\n                    \u003cp style=\"font-size:14px;line-height:24px;margin:16px 0\"\u003eNami (social psychology)\u003c/p\u003e\n                  \u003c/td\u003e\n                \u003c/tr\u003e\n              \u003c/tbody\u003e\n            \u003c/table\u003e\n          \u003c/td\u003e\n        \u003c/tr\u003e\n      \u003c/tbody\u003e\n    \u003c/table\u003e\n    \u003ctable align=\"center\" width=\"100%\" border=\"0\" cellPadding=\"0\" cellSpacing=\"0\" role=\"presentation\" style=\"margin-top:1rem;margin-bottom:1rem;max-width:37.5em\"\u003e\n      \u003ctbody\u003e\n        \u003ctr style=\"width:100%\"\u003e\n          \u003ctd\u003e\n            \u003cp style=\"text-align:center;color:rgb(255,132,210);font-size:14px;line-height:24px;margin:16px 0\"\u003e\u003ca href=\"https://rdm.tue.nl/\" style=\"color:rgb(255,132,210);text-decoration:none\" target=\"_blank\"\u003eRDM Handbook\u003c/a\u003e \u003cspan style=\"color:rgb(156,163,175)\"\u003e|\u003c/span\u003e \u003ca href=\"https://openpar.pages.tue.nl/solution-searcher/index.html\" style=\"color:rgb(255,132,210);text-decoration:none\" target=\"_blank\"\u003eSolution Searcher\u003c/a\u003e \u003cspan style=\"color:rgb(156,163,175)\"\u003e|\u003c/span\u003e \u003ca href=\"https://zenodo.org/communities/tue_rdmsupport/records?q=\u0026amp;l=list\u0026amp;p=1\u0026amp;s=10\u0026amp;sort=newest\" style=\"color:rgb(255,132,210);text-decoration:none\" target=\"_blank\"\u003eZenodo Community\u003c/a\u003e\u003c/p\u003e\n            \u003cp style=\"text-align:center;color:rgb(255,132,210);font-size:14px;line-height:24px;margin:16px 0\"\u003e\u003ca href=\"https://tue.atlassian.net/helpcenter/research/\" style=\"color:rgb(255,132,210);
