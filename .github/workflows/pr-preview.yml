name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: yarn install

      - name: Build
        if: github.event.action != 'closed'
        run: yarn build
        env:
          NEXT_PUBLIC_BASE_PATH: /tue-ds-newsletter/pr-preview/pr-${{ github.event.number }}

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./out
          pages-base-url: "tue-datastewards.github.io/tue-ds-newsletter"

      - name: Ensure .nojekyll at gh-pages root
        if: github.event.action != 'closed'
        run: mkdir -p /tmp/nojekyll && touch /tmp/nojekyll/.nojekyll

      - name: Deploy .nojekyll
        if: github.event.action != 'closed'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/nojekyll
          publish_branch: gh-pages
          keep_files: true
